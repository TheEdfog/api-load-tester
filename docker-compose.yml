services:
  demo-api:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 10

  load-tester:
    build: .
    depends_on:
      demo-api:
        condition: service_healthy
    volumes:
      - ./examples:/app/examples:ro
      - ./reports:/app/reports

